name: Governance Enforcement CI

on:
  pull_request:
    branches: [ main, develop ]

jobs:
  governance-check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
          
      - name: "Install dependencies"
        run: flutter pub get
        
      - name: "🛡️ Step 1-2 to 1-5: Run Governance Scanner"
        run: dart run scripts/governance_scanner.dart
        
      - name: "🤖 Step 2-5: Validate Machine-readable Governance"
        run: dart run scripts/validate_governance_yaml.dart
        
      - name: "📑 Step 5: Run ADR Consistency Analyzer"
        run: dart run scripts/adr_consistency_analyzer.dart
        
      - name: "⏪ Step 1-6: Run Mandatory Replay Regression Test"
        run: flutter test test/integration/replay_regression_test.dart
        
      - name: "🛡️ Phase 6: Run Replay Safety Pipeline"
        run: flutter test test/integration/phase6_replay_safety_test.dart
        
      - name: "📊 Step 6-5: Generate Replay Drift Dashboard"
        run: dart run scripts/generate_replay_dashboard.dart
        
      - name: "🌪️ Phase 7: Run Chaos & Operational Safety Test"
        run: flutter test test/integration/phase7_operational_chaos_test.dart

      - name: "🧹 Phase 9: Run Dead Rule Detector"
        run: dart run scripts/dead_rule_detector.dart

      - name: "� Run All Tests"
        run: flutter test